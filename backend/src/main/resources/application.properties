spring.application.name=rental-backend
server.port=8080

# ============================================================
# PostgreSQL (relaciona baza iz zahteva)
# Vrednosti se citaju iz env promenljivih (Docker Compose ih postavlja),
# a lokalno padaju na podrazumevane vrednosti ispod.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rental}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rental}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rental}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Ceka bazu pri startu (korisno u Docker okruzenju)
spring.datasource.hikari.initialization-fail-timeout=60000

# JSON datumi u ISO formatu
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# JWT konfiguracija
# U produkciji OBAVEZNO postaviti APP_JWT_SECRET kao env promenljivu.
# Secret mora imati >= 32 bajta (256 bita) za HS256.
# ============================================================
app.jwt.secret=${APP_JWT_SECRET:ZmVsjkFdev-rental-super-tajni-kljuc-za-potpisivanje-JWT-tokena-2024}
# Trajanje tokena u milisekundama (podrazumevano 24h)
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# CORS - dozvoljeni frontend origini (razdvojeni zarezom)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
